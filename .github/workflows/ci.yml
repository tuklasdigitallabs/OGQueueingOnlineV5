name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build deployment image
        run: docker build -t qsys-ci:${{ github.sha }} -f Dockerfile.qsys .
