<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QSys Staff Login</title>

  <style>
    :root{
      /* Match Staff/Admin warm parchment family + red accent */
      --bg-main:#f3eadc;                 /* parchment */
      --panel-bg:#fbf7f0;                /* warm ivory */
      --text-main:#1f2933;               /* charcoal */
      --text-muted:#5f6b76;
      --brand-red:#e10600;               /* accent */
      --border-soft:rgba(60,40,20,.15);
      --shadow-soft:0 14px 34px rgba(0,0,0,.12);
      --radius:18px;
      --radius-input:14px;
    }

    *{ box-sizing:border-box; }

    body{
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background: var(--bg-main);
      margin: 0;
      min-height: 100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 22px;
      color: var(--text-main);
    }

    .login-card{
      width: 100%;
      max-width: 380px;
      background: var(--panel-bg);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
      box-shadow: var(--shadow-soft);
      padding: 28px 26px 30px;
    }

    .title{
      display:flex;
      align-items:center;
      justify-content:center;
      gap: 10px;
      margin: 0 0 18px;
    }

    .dot{
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: #9ca3af;
      box-shadow: 0 0 0 5px rgba(156,163,175,.18);
      flex: 0 0 auto;
    }
    .dot.ok{
      background:#22c55e;
      box-shadow:0 0 0 5px rgba(34,197,94,.12);
    }
    .dot.bad{
      background:#e10600;
      box-shadow:0 0 0 5px rgba(225,6,0,.12);
    }

    h2{
      margin: 0;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: .02em;
      line-height: 1.15;
      text-align:center;
    }

    .sub{
      text-align:center;
      margin: 4px 0 0;
      color: var(--text-muted);
      font-size: 12.5px;
    }

    label{
      display:block;
      margin-top: 14px;
      font-weight: 800;
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: .02em;
    }

    input{
      width: 100%;
      margin-top: 7px;
      padding: 12px 14px;
      font-size: 15.5px;
      border-radius: var(--radius-input);
      border: 1px solid var(--border-soft);
      background: #fff;
      color: var(--text-main);
      outline: none;
    }

    input:focus{
      border-color: rgba(225,6,0,.65);
      box-shadow: 0 0 0 4px rgba(225,6,0,.10);
    }

    .hint{
      margin-top: 8px;
      color: var(--text-muted);
      font-size: 12px;
    }

    button{
      width: 100%;
      margin-top: 22px;
      padding: 13px 14px;
      font-size: 16px;
      font-weight: 900;
      border-radius: 999px;              /* centered + rounded */
      border: 1px solid var(--brand-red);
      background: var(--brand-red);
      color: #fff;
      cursor: pointer;
      display:block;
    }

    button:hover{ opacity: .95; }
    button:active{ transform: translateY(1px); }

    .err{
      margin-top: 14px;
      font-size: 13.5px;
      color: #b00020;
      text-align:center;
      min-height: 18px;
    }
  </style>
</head>

<body>
  <div class="login-card">
    <div class="title">
      <span class="dot" aria-hidden="true"></span>
      <div>
        <h2>Staff Login</h2>
        <div class="sub">Enter your username and PIN</div>
      </div>
    </div>

    <label>Username</label>
    <!-- Keep id=fullName for backend compatibility -->
    <input id="fullName" autocomplete="username" />

    <label>PIN</label>
    <input
      id="pin"
      type="password"
      inputmode="numeric"
      autocomplete="current-password"
      pattern="[0-9]*"
      maxlength="6"
      aria-label="PIN"
    />
    <div class="hint">Numeric keypad enabled • up to 6 digits</div>

    <button id="btn" type="button">Login</button>
    <div class="err" id="err"></div>
  </div>

  <script src="./app-boot.js"></script>
  <script>
    const $n = document.getElementById("fullName");
    const $p = document.getElementById("pin");
    const $e = document.getElementById("err");
    const $dot = document.querySelector(".dot");

    async function refreshHealth() {
      try {
        const r = await fetch("/api/health", { cache: "no-store" });
        const ok = r.ok;
        $dot.classList.remove("ok", "bad");
        $dot.classList.add(ok ? "ok" : "bad");
      } catch {
        $dot.classList.remove("ok");
        $dot.classList.add("bad");
      }
    }

    // Numeric keypad optimization: strip non-digits as user types
    $p.addEventListener("input", () => {
      const cleaned = ($p.value || "").replace(/\D+/g, "");
      if (cleaned !== $p.value) $p.value = cleaned;
    });

    // Enter key submits
    [$n, $p].forEach(el => el.addEventListener("keydown", (ev) => {
      if (ev.key === "Enter") document.getElementById("btn").click();
    }));

    document.getElementById("btn").addEventListener("click", async () => {
      $e.textContent = "";
      try {
        const r = await fetch("/api/staff/auth/login", {

          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({ fullName: $n.value, pin: $p.value })
        });
        const j = await r.json();
        if (!j.ok) { $e.textContent = j.error || "Login failed"; return; }
        location.href = window.appUrl("/staff");
      } catch {
        $e.textContent = "Server error";
      }
    });

    refreshHealth();
    setInterval(refreshHealth, 5000);
  </script>
</body>
</html>
