<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login Diagnostics</title>
  <style>
    body{
      margin:0;
      font-family:Segoe UI, Arial, sans-serif;
      background:#f4efe6;
      color:#1f2937;
    }
    .wrap{
      max-width:1100px;
      margin:32px auto;
      padding:0 16px 40px;
    }
    .card{
      background:#fff;
      border-radius:18px;
      box-shadow:0 14px 40px rgba(0,0,0,.08);
      padding:20px;
      margin-bottom:18px;
    }
    h1,h2{margin:0 0 12px}
    .row{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:end;
    }
    label{
      display:flex;
      flex-direction:column;
      gap:6px;
      font-weight:600;
      min-width:220px;
      flex:1;
    }
    input{
      border:1px solid #d1d5db;
      border-radius:12px;
      padding:12px 14px;
      font-size:16px;
    }
    button{
      border:0;
      border-radius:12px;
      background:#b91c1c;
      color:#fff;
      padding:12px 18px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
    }
    .muted{color:#6b7280}
    .err{color:#b91c1c;font-weight:700}
    pre{
      white-space:pre-wrap;
      word-break:break-word;
      background:#111827;
      color:#e5e7eb;
      border-radius:14px;
      padding:16px;
      overflow:auto;
      font-size:13px;
      line-height:1.45;
    }
    .link{
      color:#b91c1c;
      text-decoration:none;
      font-weight:700;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Admin Login Diagnostics</h1>
      <p class="muted">Temporary tool for tracing user login, branch assignment, branch status, license status, and runtime DB path.</p>
      <div class="row">
        <label>
          Full Name
          <input id="fullName" placeholder="staffulo" />
        </label>
        <label>
          Branch Code
          <input id="branchCode" placeholder="YL-YULO" />
        </label>
        <button id="runBtn" type="button">Run Trace</button>
      </div>
      <p id="status" class="muted" style="margin:12px 0 0">Ready.</p>
    </div>

    <div class="card">
      <h2>Output</h2>
      <p><a class="link" href="" id="rawLink" target="_blank" rel="noreferrer">Open raw JSON</a></p>
      <pre id="output">Run a trace to inspect the live login state.</pre>
    </div>
  </div>

  <script src="./app-boot.js"></script>
  <script>
    const fullNameEl = document.getElementById("fullName");
    const branchCodeEl = document.getElementById("branchCode");
    const runBtn = document.getElementById("runBtn");
    const statusEl = document.getElementById("status");
    const outputEl = document.getElementById("output");
    const rawLinkEl = document.getElementById("rawLink");

    function buildUrl() {
      const params = new URLSearchParams();
      const fullName = String(fullNameEl.value || "").trim();
      const branchCode = String(branchCodeEl.value || "").trim().toUpperCase();
      if (fullName) params.set("fullName", fullName);
      if (branchCode) params.set("branchCode", branchCode);
      return window.appUrl(`/api/admin/diagnostics/login-trace?${params.toString()}`);
    }

    async function runTrace() {
      const url = buildUrl();
      rawLinkEl.href = url;
      statusEl.className = "muted";
      statusEl.textContent = "Loading diagnostics...";
      outputEl.textContent = "";
      try {
        const res = await fetch(url, { cache: "no-store" });
        const data = await res.json();
        outputEl.textContent = JSON.stringify(data, null, 2);
        statusEl.textContent = data.ok ? "Trace loaded." : (data.error || "Trace failed.");
        if (!data.ok) statusEl.className = "err";
      } catch (err) {
        statusEl.textContent = "Failed to load diagnostics.";
        statusEl.className = "err";
        outputEl.textContent = String(err && err.message ? err.message : err);
      }
    }

    runBtn.addEventListener("click", runTrace);
    [fullNameEl, branchCodeEl].forEach((el) => {
      el.addEventListener("keydown", (ev) => {
        if (ev.key === "Enter") runTrace();
      });
    });
  </script>
</body>
</html>
