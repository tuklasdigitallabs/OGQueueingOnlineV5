<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Session Diagnostics</title>
  <style>
    body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#f5efe5;color:#1f2937}
    .wrap{max-width:960px;margin:32px auto;padding:0 16px}
    .card{background:#fff;border-radius:18px;box-shadow:0 14px 40px rgba(0,0,0,.08);padding:20px}
    h1{margin:0 0 12px}
    p{margin:0 0 12px}
    button{border:0;border-radius:12px;background:#b91c1c;color:#fff;padding:12px 18px;font-weight:700;cursor:pointer}
    .muted{color:#6b7280}
    pre{white-space:pre-wrap;word-break:break-word;background:#111827;color:#e5e7eb;border-radius:14px;padding:16px;overflow:auto;font-size:13px;line-height:1.45}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Admin Session Diagnostics</h1>
      <p class="muted">Temporary tool to inspect what the server sees for the admin session on a direct page load.</p>
      <p><button id="reloadBtn" type="button">Reload Diagnostics</button></p>
      <pre id="output">Loading...</pre>
    </div>
  </div>

  <script src="./app-boot.js"></script>
  <script>
    const outputEl = document.getElementById("output");
    async function load() {
      try {
        const res = await fetch(window.appUrl("/api/admin/session-diagnostics"), { cache: "no-store" });
        const data = await res.json();
        outputEl.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        outputEl.textContent = String(err && err.message ? err.message : err);
      }
    }
    document.getElementById("reloadBtn").addEventListener("click", load);
    load();
  </script>
</body>
</html>
